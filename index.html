<style>
@font-face{font-family:'Fraunces';src:url('fonts/Fraunces.woff2') format('woff2');font-weight:100 900;font-style:normal;font-display:swap}
@font-face{font-family:'Fraunces';src:url('fonts/Fraunces-Italic.woff2') format('woff2');font-weight:100 900;font-style:italic;font-display:swap}
@font-face{font-family:'Space Grotesk';src:url('fonts/SpaceGrotesk.woff2') format('woff2');font-weight:300 700;font-style:normal;font-display:swap}
</style>
<style>
:root{
  /* Welt A: Science */
  --ink:#0D1B2A; --ink-soft:#16283C; --teal:#27B5A4; --teal-dim:#1B8478;
  /* Welt B: Tanz */
  --plum:#26091F; --plum-soft:#3A1230; --coral:#E8506B; --amber:#F2A33C;
  /* Bridge */
  --paper:#F6F4EF; --paper-dim:#EAE6DC; --text-dark:#1B222B; --text-light:#F3EFE8;
  --maxw:1100px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
section,header{scroll-margin-top:72px}
body{font-family:'Space Grotesk',sans-serif;background:var(--paper);color:var(--text-dark);line-height:1.6;font-size:17px}
img{max-width:100%;display:block}
a{color:inherit}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px}
.eyebrow{font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;font-weight:500;opacity:.75}
h2.section-title{font-family:'Fraunces',serif;font-weight:560;font-size:clamp(1.9rem,4vw,2.7rem);line-height:1.12;margin:.35em 0 .6em}
.serif-i{font-family:'Fraunces',serif;font-style:italic;font-weight:480}

/* ---------- NAV ---------- */
nav{position:fixed;top:0;left:0;right:0;z-index:50;backdrop-filter:blur(10px);background:rgba(246,244,239,.82);border-bottom:1px solid rgba(13,27,42,.08)}
.nav-inner{max-width:var(--maxw);margin:0 auto;padding:12px 24px;display:flex;align-items:center;gap:18px;position:relative}
.nav-name{font-family:'Fraunces',serif;font-weight:640;font-size:1.05rem;text-decoration:none;white-space:nowrap}
.nav-links{display:flex;gap:20px;margin-left:auto}
.nav-links a{text-decoration:none;font-size:.85rem;opacity:.8;transition:opacity .2s}
.nav-links a:hover,.nav-links a:focus-visible{opacity:1}
.lang-switch{display:flex;gap:2px;border:1px solid rgba(13,27,42,.25);border-radius:99px;padding:3px;margin-left:14px}
.lang-switch button{border:0;background:transparent;font:inherit;font-size:.75rem;font-weight:600;letter-spacing:.05em;padding:3px 10px;border-radius:99px;cursor:pointer;color:var(--text-dark);opacity:.6;transition:.2s}
.lang-switch button.active{background:var(--ink);color:var(--text-light);opacity:1}
.lang-switch button:hover{opacity:1}
.burger{display:none;width:40px;height:40px;border:0;background:transparent;border-radius:50%;cursor:pointer;align-items:center;justify-content:center;flex-direction:column;gap:5px;color:var(--ink)}
.burger span{width:20px;height:2px;background:currentColor;border-radius:2px;transition:transform .2s,opacity .2s}
.burger[aria-expanded="true"] span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.burger[aria-expanded="true"] span:nth-child(2){opacity:0}
.burger[aria-expanded="true"] span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}

/* ---------- CLAVE MOTIF ---------- */
.clave{display:flex;align-items:center;gap:14px;justify-content:center;padding:42px 0}
.clave .beat{width:9px;height:9px;border-radius:50%;background:currentColor;opacity:.28}
.clave .hit{opacity:1;animation:clavePulse 3.6s infinite}
.clave .hit:nth-child(4){animation-delay:.675s}
.clave .hit:nth-child(6){animation-delay:1.125s}
.clave .hit:nth-child(10){animation-delay:2.025s}
.clave .hit:nth-child(13){animation-delay:2.7s}
.clave .hit:nth-child(16){animation-delay:3.375s}
@keyframes clavePulse{0%,12%,100%{transform:scale(1)}6%{transform:scale(1.9)}}
@media (prefers-reduced-motion:reduce){.clave .hit{animation:none}}

/* ---------- HERO ---------- */
header.hero{min-height:100svh;display:grid;grid-template-columns:1fr 1fr;position:relative;color:var(--text-light);overflow:hidden}
.hero-half{padding:120px 40px 60px;display:flex;flex-direction:column;justify-content:center;position:relative}
/* Platz für die Namenskarte in der Mitte reservieren, damit kein Text überdeckt wird */

.hero-sci{background:linear-gradient(155deg,var(--ink) 0%,var(--ink-soft) 100%)}
.hero-dance{align-items:flex-end;text-align:right}
.hero-dance p{margin-left:auto}
.hero-dance{background:linear-gradient(205deg,var(--plum) 0%,var(--plum-soft) 100%)}
.hero-sci .eyebrow{color:var(--teal)}
.hero-dance .eyebrow{color:var(--amber)}
.hero-half h1{font-family:'Fraunces',serif;font-size:clamp(1.7rem,3.4vw,2.6rem);line-height:1.15;font-weight:520;margin:.4em 0 .5em}
.hero-dance h1{font-style:italic}
.hero-half p{font-size:.98rem;opacity:.85;max-width:420px}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(39,181,164,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(39,181,164,.07) 1px,transparent 1px);background-size:44px 44px;pointer-events:none}
.hero-waves{position:absolute;inset:0;pointer-events:none;opacity:.25}
.hero-half > :not(.hero-grid):not(.hero-waves){position:relative;z-index:1}

.scroll-hint{position:absolute;bottom:26px;left:50%;transform:translateX(-50%);z-index:5;font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text-light);opacity:.75;display:flex;flex-direction:column;align-items:center;gap:8px;animation:hintFloat 2.4s ease-in-out infinite;transition:opacity .5s,visibility .5s}
.scroll-hint::after{content:"";width:10px;height:10px;border-right:2px solid currentColor;border-bottom:2px solid currentColor;transform:rotate(45deg)}
.scroll-hint.hidden{opacity:0;visibility:hidden}
@keyframes hintFloat{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(8px)}}
@media (prefers-reduced-motion:reduce){.scroll-hint{animation:none}}

/* ---------- SOCIAL ICONS ---------- */
.icon-btn{width:40px;height:40px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;border:1.5px solid currentColor;transition:.2s;text-decoration:none}
.icon-btn:hover,.icon-btn:focus-visible{transform:translateY(-3px)}
.icon-btn svg{width:18px;height:18px;fill:currentColor}

/* ---------- SECTIONS ---------- */
section{padding:80px 0}
.sci-accent{color:var(--teal-dim)}
.dance-accent{color:var(--coral)}
.section-head{max-width:640px}
.lede{font-size:1.05rem;opacity:.85}

/* About */
#about{background:var(--paper)}
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:start;margin-top:28px}
.about-col h3{font-family:'Fraunces',serif;font-weight:580;font-size:1.25rem;margin-bottom:.5em}
.about-col.sci h3{color:var(--ink)}
.about-col.dance h3{color:var(--plum);font-style:italic}
.about-bridge{grid-column:1/-1;background:linear-gradient(90deg,var(--ink),var(--plum));color:var(--text-light);border-radius:16px;padding:28px 32px;font-size:1.02rem}
.about-bridge .serif-i{color:var(--amber)}

/* Timelines */
#academic{background:var(--ink);color:var(--text-light)}
#academic .eyebrow{color:var(--teal)}
#dance{background:var(--plum);color:var(--text-light)}
#dance .eyebrow{color:var(--amber)}
.timeline-split{margin-top:36px;display:grid;grid-template-columns:1fr 1fr;gap:28px;align-items:start}
.timeline-column{border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.055);border-radius:18px;padding:24px 24px 26px;box-shadow:0 18px 45px rgba(0,0,0,.08)}
.timeline-column h3{font-family:'Fraunces',serif;font-weight:560;font-size:1.2rem;line-height:1.2;margin-bottom:20px}
#dance .timeline-column h3{font-style:italic;color:var(--amber)}
#academic .timeline-column h3{color:var(--teal)}
.timeline{border-left:2px solid rgba(255,255,255,.18);padding-left:28px;display:flex;flex-direction:column;gap:28px}
.t-item{position:relative}
.t-item.is-current::before{box-shadow:0 0 0 6px rgba(39,181,164,.16)}
#dance .t-item.is-current::before{box-shadow:0 0 0 6px rgba(232,80,107,.18)}
.t-item::before{content:"";position:absolute;left:-34.5px;top:8px;width:11px;height:11px;border-radius:50%;background:var(--teal)}
#dance .t-item::before{background:var(--coral)}
.t-date{font-size:.75rem;letter-spacing:.14em;text-transform:uppercase;opacity:.65}
.t-item h4{font-size:1.08rem;font-weight:600;margin:.2em 0 .25em}
#dance .t-item h4{font-family:'Fraunces',serif;font-style:italic;font-weight:540;font-size:1.15rem}
.t-item p{font-size:.93rem;opacity:.82;max-width:620px}
.t-org{font-size:.85rem;opacity:.65}
.timeline-empty{font-size:.92rem;opacity:.62}

/* Skills */
#skills{background:var(--paper-dim)}
.skills-grid{display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-top:32px}
.skill-card{border-radius:16px;padding:30px;color:var(--text-light)}
.skill-card.sci{background:var(--ink)}
.skill-card.dance{background:var(--plum)}
.skill-card h3{font-family:'Fraunces',serif;font-size:1.3rem;font-weight:580;margin-bottom:14px}
.skill-card.dance h3{font-style:italic}
.chips{display:flex;flex-wrap:wrap;gap:9px}
.chip{font-size:.82rem;padding:6px 13px;border-radius:99px;border:1px solid rgba(255,255,255,.3)}
.skill-card.sci .chip.hot{background:var(--teal);border-color:var(--teal);color:var(--ink);font-weight:600}
.skill-card.dance .chip.hot{background:var(--coral);border-color:var(--coral);color:#fff;font-weight:600}
.skill-note{font-size:.85rem;opacity:.7;margin-top:16px}
/* Dritte Karte: Sprachen & Soft Skills — volle Breite, Brücken-Gradient */
.skill-card.extra{grid-column:1/-1;background:linear-gradient(90deg,var(--ink),var(--plum));display:grid;grid-template-columns:auto 1fr;gap:40px}
.skill-card.extra h3{font-size:1.1rem}
.skill-card.extra .extra-col:last-child h3{font-style:italic}
@media (max-width:840px){.skill-card.extra{grid-template-columns:1fr;gap:24px}}

/* Projects */
#projects{background:var(--paper)}
.proj-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(300px,100%),1fr));gap:24px;margin-top:34px}
.proj-card{border-radius:16px;padding:26px;border:1.5px solid rgba(13,27,42,.12);background:#fff;display:flex;flex-direction:column;gap:10px;transition:transform .2s,box-shadow .2s}
.proj-card:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(13,27,42,.1)}
.proj-tag{font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;font-weight:700}
.proj-card.sci .proj-tag{color:var(--teal-dim)}
.proj-card.dance .proj-tag{color:var(--coral)}
.proj-card h4{font-size:1.12rem;font-weight:600}
.proj-card.dance h4{font-family:'Fraunces',serif;font-style:italic;font-weight:560}
.proj-card p{font-size:.9rem;opacity:.8}
.proj-media{height:150px;border-radius:10px;background:repeating-linear-gradient(45deg,var(--paper-dim),var(--paper-dim) 12px,#fff 12px,#fff 24px);display:flex;align-items:center;justify-content:center;font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;opacity:.55;margin-bottom:6px}

/* Contact */
#contact{background:linear-gradient(135deg,var(--ink) 0%,var(--plum) 100%);color:var(--text-light);text-align:center}
#contact .section-head{margin:0 auto}
.contact-lines{margin:26px 0 8px;font-size:1.05rem;display:flex;flex-direction:column;gap:6px}
.contact-lines a{color:var(--amber);text-decoration:none}
.contact-lines a:hover{text-decoration:underline}
.socials-row{display:flex;gap:16px;justify-content:center;margin-top:26px;color:var(--text-light)}
footer{background:#0A1420;color:var(--text-light);padding:26px 0;font-size:.8rem;text-align:center;opacity:.85}

/* Positionierung: schmales Band direkt unter dem Hero */
.positioning{background:var(--paper);border-bottom:1px solid rgba(13,27,42,.08);padding:26px 0}
.positioning .wrap{display:flex;align-items:center;gap:22px;flex-wrap:wrap;justify-content:space-between}
.positioning p{font-family:'Fraunces',serif;font-weight:480;font-size:clamp(1.02rem,2vw,1.22rem);line-height:1.45;max-width:760px}
.positioning p::before{content:"";display:inline-block;width:26px;height:2px;background:linear-gradient(90deg,var(--teal),var(--coral));vertical-align:middle;margin-right:14px}
/* Aktuell-Zeile: kleines Signal über der Positionierung, ausgeblendet wenn leer */
.news-line{display:inline-flex;align-items:center;gap:9px;font-size:.82rem;font-weight:600;color:var(--teal-dim);background:rgba(39,181,164,.1);border:1px solid rgba(39,181,164,.3);border-radius:99px;padding:5px 14px;margin-bottom:12px}
.news-dot{width:7px;height:7px;border-radius:50%;background:var(--teal);animation:newsPulse 2.4s ease-in-out infinite}
@keyframes newsPulse{0%,100%{opacity:1}50%{opacity:.35}}
@media (prefers-reduced-motion:reduce){.news-dot{animation:none}}

/* CV-Button */
.cta-btn{display:inline-flex;align-items:center;gap:9px;font:inherit;font-weight:600;font-size:.9rem;letter-spacing:.02em;text-decoration:none;padding:11px 22px;border-radius:99px;background:var(--ink);color:var(--text-light);border:1.5px solid var(--ink);transition:transform .2s,box-shadow .2s;white-space:nowrap}
.cta-btn:hover,.cta-btn:focus-visible{transform:translateY(-2px);box-shadow:0 10px 24px rgba(13,27,42,.22)}
.cta-btn svg{width:15px;height:15px;fill:currentColor}
#contact .cta-btn{background:var(--amber);border-color:var(--amber);color:var(--ink);margin-top:28px}

/* Profilbild im Über-mich-Bereich (nur sichtbar, wenn eine URL hinterlegt ist) */
.about-head{display:flex;gap:36px;align-items:flex-start;justify-content:space-between;flex-wrap:wrap}
.profile-figure{flex:0 0 auto;margin:0}
.profile-figure img{width:168px;height:168px;object-fit:cover;border-radius:50%;border:3px solid var(--paper-dim);box-shadow:0 14px 34px rgba(13,27,42,.16)}
.profile-figure figcaption{font-size:.78rem;opacity:.6;text-align:center;margin-top:10px;max-width:180px}

/* Teaching Approach im Tanzbereich */
.teach-card{margin-top:34px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.06);border-radius:18px;padding:26px 28px;max-width:760px}
.teach-card h3{font-family:'Fraunces',serif;font-style:italic;font-weight:560;font-size:1.25rem;color:var(--amber);margin-bottom:.45em}
.teach-card p{font-size:.95rem;opacity:.88}

/* Tanz-Galerie (rendert nur vorhandene Bilder) */
.gallery{margin-top:34px}
.gallery h3{font-family:'Fraunces',serif;font-style:italic;font-weight:560;font-size:1.2rem;color:var(--amber);margin-bottom:16px}
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
.gallery-grid figure{margin:0;border-radius:14px;overflow:hidden;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14)}
.gallery-grid img{width:100%;height:210px;object-fit:cover;display:block}
.gallery-grid video{width:100%;height:280px;object-fit:cover;display:block;background:#000}
.gallery-grid figure.is-video{max-width:330px}
.gallery-grid figcaption{font-size:.8rem;opacity:.75;padding:10px 14px}

/* Bridge: Wo Daten auf Bewegung treffen */
#bridge{background:linear-gradient(120deg,var(--ink) 0%,var(--plum) 100%);color:var(--text-light);padding:70px 0}
#bridge .eyebrow{color:var(--teal)}
#bridge .section-title{font-style:italic}
#bridge p{max-width:720px;font-size:1.02rem;opacity:.9}
#bridge .bridge-terms{margin-top:22px;display:flex;flex-wrap:wrap;gap:9px}
#bridge .bridge-terms .chip{border-color:rgba(255,255,255,.3);font-size:.8rem}

/* Kontakt: zwei Kontaktarten */
.contact-split{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(260px,100%),1fr));gap:18px;max-width:720px;margin:32px auto 0;text-align:left}
.contact-card{border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.06);border-radius:16px;padding:22px 24px}
.contact-card h3{font-family:'Fraunces',serif;font-weight:560;font-size:1.12rem;margin-bottom:.35em}
.contact-card.dance h3{font-style:italic;color:var(--amber)}
.contact-card.data h3{color:var(--teal)}
.contact-card p{font-size:.9rem;opacity:.85}
.booking-btn{display:inline-flex;align-items:center;gap:8px;margin-top:14px;font-size:.85rem;font-weight:600;text-decoration:none;padding:9px 18px;border-radius:99px;background:var(--coral);color:#fff;transition:transform .2s,box-shadow .2s}
.booking-btn:hover,.booking-btn:focus-visible{transform:translateY(-2px);box-shadow:0 10px 22px rgba(232,80,107,.35)}
.booking-btn svg{width:15px;height:15px;fill:currentColor}

/* Projektbilder ersetzen den Platzhalter, wenn eine URL vorhanden ist */
.proj-media img{width:100%;height:100%;object-fit:cover;border-radius:10px}
.proj-media.has-img{background:none;opacity:1;padding:0;overflow:hidden}
.proj-caption{font-size:.76rem;opacity:.6;margin-top:-2px}
.proj-badge{font-size:.64rem;letter-spacing:.16em;text-transform:uppercase;font-weight:700;background:var(--amber);color:var(--ink);border-radius:99px;padding:3px 10px;margin-left:8px;vertical-align:middle}
.proj-link{margin-top:auto;align-self:flex-start;font-size:.85rem;font-weight:600;text-decoration:none;padding:7px 15px;border-radius:99px;border:1.5px solid currentColor;transition:transform .2s}
.proj-card.sci .proj-link{color:var(--teal-dim)}
.proj-card.dance .proj-link{color:var(--coral)}
.proj-link:hover,.proj-link:focus-visible{transform:translateY(-2px)}

/* Instagram-Embeds in der Tanz-Galerie (Hochformat, kompakt) */
.gallery-grid figure.is-embed{max-width:330px;background:#000}
.insta-embed{position:relative;width:100%;aspect-ratio:9/14;overflow:hidden}
.insta-embed iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.insta-fallback{display:block;font-size:.8rem;font-weight:600;color:var(--amber);text-decoration:none;padding:9px 14px 2px}
.insta-fallback:hover,.insta-fallback:focus-visible{text-decoration:underline}

/* focus */
:focus-visible{outline:2.5px solid var(--teal);outline-offset:3px;border-radius:4px}

/* ---------- RESPONSIVE ---------- */
@media (max-width:840px){
  header.hero{grid-template-columns:1fr;min-height:auto}
  .hero-half{padding:90px 26px 70px;min-height:46svh}
  .hero-dance{align-items:flex-start;text-align:left}
  .hero-dance p{margin-left:0}
  .scroll-hint{display:none}
  .about-grid,.skills-grid,.timeline-split{grid-template-columns:1fr}
  .nav-inner{gap:10px}
  .nav-name{font-size:.98rem;max-width:48vw;overflow:hidden;text-overflow:ellipsis}
  .lang-switch{margin-left:auto}
  .burger{display:inline-flex}
  .nav-links{display:none;position:absolute;top:calc(100% + 10px);left:24px;right:24px;margin-left:0;padding:16px;border-radius:16px;border:1px solid rgba(13,27,42,.12);background:rgba(246,244,239,.98);box-shadow:0 18px 40px rgba(13,27,42,.12);flex-direction:column;gap:12px}
  .nav-links.open{display:flex}
  .nav-links a{font-size:.95rem;padding:10px 2px}
  section{padding:60px 0}
  .positioning .wrap{flex-direction:column;align-items:flex-start;gap:16px}
  .positioning p::before{display:none}
  .about-head{flex-direction:column-reverse;gap:22px}
  .profile-figure img{width:132px;height:132px}
  .gallery-grid img{height:180px}
  .about-grid{gap:32px}
  .timeline-column{padding:20px 18px 22px}
  .teach-card{padding:22px 20px}
  .contact-card{padding:18px 20px}
}

/* ---------- SMARTPHONE ---------- */
@media (max-width:560px){
  body{font-size:16px}
  .wrap{padding:0 18px}

function esc(s){ const d=document.createElement("div"); d.textContent=s??""; return d.innerHTML; }
function t(obj, lang){ return (obj && (obj[lang] !== undefined ? obj[lang] : obj.de)) || ""; }

/* Sicherstellen, dass ältere content.js-Stände (z.B. Entwürfe) keine Fehler werfen */
function ensureImageData(data){
  const emptyMl = () => ({de:"",en:"",es:""});
  data.images = data.images || {};
  data.images.profile = data.images.profile || {url:"",alt:emptyMl(),caption:emptyMl()};
  data.images.profile.alt = data.images.profile.alt || emptyMl();
  data.images.profile.caption = data.images.profile.caption || emptyMl();
  data.images.profile.fit = data.images.profile.fit || "cover";
  data.images.profile.pos = data.images.profile.pos || "center";
  data.images.dance_gallery = Array.isArray(data.images.dance_gallery) ? data.images.dance_gallery : [];
  data.images.dance_gallery.forEach(g => {
    g.alt = g.alt || emptyMl(); g.caption = g.caption || emptyMl();
    g.url = g.url || ""; g.instagram = g.instagram || "";
    g.fit = g.fit || "cover"; g.pos = g.pos || "center";
  });
  (data.projects || []).forEach(p => {
    p.image = p.image || {url:"",alt:emptyMl(),caption:emptyMl()};
    p.image.alt = p.image.alt || emptyMl();
    p.image.caption = p.image.caption || emptyMl();
    p.image.fit = p.image.fit || "cover";
    p.image.pos = p.image.pos || "center";
    p.link = p.link || {url:"",label:emptyMl()};
    p.link.label = p.link.label || emptyMl();
  });
  data.skills = data.skills || {};
  data.skills.lang = data.skills.lang || {chips:[]};
  data.skills.soft = data.skills.soft || {chips:[]};
  return data;
}
ensureImageData(C);

/* Inline-Style für Bild-Darstellung (Zuschnitt + Ausrichtung) */
function imgStyle(obj){
  const fit = obj.fit === "contain" ? "contain" : "cover";
  const allowed = ["center","top","bottom","left","right"];
  const pos = allowed.includes(obj.pos) ? obj.pos : "center";
  return `object-fit:${fit};object-position:${pos}`;
}

/* Instagram-Post/Reel-URL in Embed-URL umwandeln (nur instagram.com zulassen) */
function instagramEmbedUrl(url){
  try {
    const u = new URL(url);
    if (!/(^|\.)instagram\.com$/.test(u.hostname)) return "";
    const m = u.pathname.match(/^\/(?:[^/]+\/)?(p|reel|reels|tv)\/([A-Za-z0-9_-]+)/);
    if (!m) return "";
    return `https://www.instagram.com/${m[1] === "reels" ? "reel" : m[1]}/${m[2]}/embed`;
  } catch(e){ return ""; }
}

const SOCIAL_LABELS = {
  linkedin: "LinkedIn-Profil öffnen",
  instagram: "Instagram-Profil öffnen",
  tiktok: "TikTok-Profil öffnen",
  youtube: "YouTube-Kanal öffnen",
  email: "E-Mail schreiben"
};

function renderSocials(containerId){
  const el = document.getElementById(containerId);
  el.innerHTML = "";
  for (const [key, url] of Object.entries(C.socials)){
    if (!url) continue; // leere Links überspringen
    const a = document.createElement("a");
    a.href = url; a.className = "icon-btn";
    a.target = key === "email" ? "_self" : "_blank";
    a.rel = "noopener"; a.setAttribute("aria-label", SOCIAL_LABELS[key] || key);
    a.innerHTML = ICONS[key] || "";
    el.appendChild(a);
  }
}

/* Profilbild & Tanz-Galerie: nur rendern, wenn eine Bild-URL vorhanden ist */
function renderProfile(lang){
  const fig = document.getElementById("profile-figure");
  const img = document.getElementById("profile-img");
  const cap = document.getElementById("profile-caption");
  const p = C.images.profile;
  if (p && p.url){
    img.src = p.url;
    img.style.cssText = imgStyle(p);
    img.alt = t(p.alt, lang) || C.meta.name || "";
    const caption = t(p.caption, lang);
    cap.textContent = caption;
    cap.hidden = !caption;
    fig.hidden = false;
  } else {
    fig.hidden = true;
    img.removeAttribute("src");
  }
}

function renderDanceGallery(lang){
  const wrap = document.getElementById("dance-gallery");
  const grid = document.getElementById("dance-gallery-grid");
  const items = (C.images.dance_gallery || []).filter(g => g && (g.url || instagramEmbedUrl(g.instagram || "")));
  if (!items.length){ wrap.hidden = true; grid.innerHTML = ""; return; }
  wrap.hidden = false;
  const dict = C.ui[lang] || C.ui.de;
  grid.innerHTML = items.map(g => {
    const caption = t(g.caption, lang);
    const insta = instagramEmbedUrl(g.instagram || "");
    const isVideo = /\.(mp4|webm|mov)(\?.*)?$/i.test(g.url || "");
    /* Prioritaet: Instagram-Embed > Videodatei (Autoplay, stumm, Schleife) > Bild */
    let media, cls = "";
    if (insta){
      cls = " is-embed";
      media = `<div class="insta-embed"><iframe src="${esc(insta)}" title="${esc(t(g.alt, lang) || "Instagram-Video")}" loading="lazy" allowfullscreen allow="encrypted-media" scrolling="no" frameborder="0"></iframe></div>
        <a class="insta-fallback" href="${esc(g.instagram)}" target="_blank" rel="noopener">${esc(dict.insta_view || "Auf Instagram ansehen")} <span aria-hidden="true">↗</span></a>`;
    } else if (isVideo){
      cls = " is-video";
      media = `<video src="${esc(g.url)}" style="${imgStyle(g)}" autoplay muted loop playsinline preload="metadata" aria-label="${esc(t(g.alt, lang))}"></video>`;
    } else {
      media = `<img src="${esc(g.url)}" alt="${esc(t(g.alt, lang))}" style="${imgStyle(g)}" loading="lazy">`;
    }
    return `<figure class="g-item${cls}">
      ${media}
      ${caption ? `<figcaption>${esc(caption)}</figcaption>` : ""}
    </figure>`;
  }).join("");
}

/* Timeline-Sortierung: aktuelle/offene Einträge zuerst, danach rückwärts chronologisch.
   Wichtig: Die Originaldaten aus content.js bleiben unverändert. */
function collectDateLabels(dateObj, lang){
  const labels = [];
  if (dateObj?.[lang]) labels.push(dateObj[lang]);
  for (const value of Object.values(dateObj || {})){
    if (value && !labels.includes(value)) labels.push(value);
  }
  return labels.join(" | ");
}

function timelineRank(item, lang){
  const raw = collectDateLabels(item.date, lang);
  const lower = raw.toLowerCase();
  const numericDates = [...raw.matchAll(/(\d{1,2})[.\/](\d{4})/g)]
    .map(m => Number(m[2]) * 100 + Number(m[1]));
  const years = [...raw.matchAll(/(?:19|20)\d{2}/g)].map(m => Number(m[0]) * 100);
  const values = numericDates.length ? numericDates : years;
  const start = values.length ? Math.min(...values) : 999912;
  const end = values.length ? Math.max(...values) : 999912;
  const currentWords = /(seit|since|desde|fortlaufend|forlaufend|ongoing|en curso|present|presente|heute|today|hoy|actualidad)/i.test(lower);
  const currentYear = new Date().getFullYear() * 100;
  const isCurrent = currentWords || end >= currentYear;
  return { isCurrent, start, end };
}

function sortTimelineItems(items, lang){
  return [...items].map((item, index) => ({ item, index, rank: timelineRank(item, lang) }))
    .sort((a,b) => {
      const aPrimary = a.rank.isCurrent ? a.rank.start : a.rank.end;
      const bPrimary = b.rank.isCurrent ? b.rank.start : b.rank.end;
      const aSecondary = a.rank.isCurrent ? a.rank.end : a.rank.start;
      const bSecondary = b.rank.isCurrent ? b.rank.end : b.rank.start;
      return Number(b.rank.isCurrent) - Number(a.rank.isCurrent) ||
        bPrimary - aPrimary ||
        bSecondary - aSecondary ||
        a.index - b.index;
    })
    .map(entry => entry.item);
}

function normalizedDateLabel(item, lang){
  return t(item.date, lang).replace(/^Forlaufend$/i, "Fortlaufend");
}

function inferTimelineCategory(item, lang){
  if (item.category === "education" || item.category === "experience") return item.category;
  const raw = `${t(item.title, lang)} ${t(item.org, lang)} ${t(item.text, lang)}`.toLowerCase();
  return /(bsc|bachelor|berufsmatur|lehre|apprenticeship|ausbildung|training|formación|dsalsa|pedagog)/i.test(raw)
    ? "education"
    : "experience";
}

function renderTimelineItem(it, lang){
  const current = timelineRank(it, lang).isCurrent;
  return `
    <div class="t-item${current ? " is-current" : ""}">
      <div class="t-date">${esc(normalizedDateLabel(it,lang))}</div>
      <h4>${esc(t(it.title,lang))}</h4>
      <div class="t-org">${esc(t(it.org,lang))}</div>
      <p>${esc(t(it.text,lang))}</p>
    </div>`;
}

function renderTimeline(id, items, lang, prefix){
  const el = document.getElementById(id);
  const dict = C.ui[lang] || C.ui.de;
  const sorted = sortTimelineItems(items, lang);
  const groups = [
    {key:"education", title:dict[`${prefix}_education_h`] || "Ausbildung"},
    {key:"experience", title:dict[`${prefix}_experience_h`] || "Erfahrung"}
  ];
  el.innerHTML = groups.map(group => {
    const groupItems = sorted.filter(it => inferTimelineCategory(it, lang) === group.key);
    const body = groupItems.length
      ? `<div class="timeline">${groupItems.map(it => renderTimelineItem(it, lang)).join("")}</div>`
      : `<p class="timeline-empty">${esc(dict.timeline_empty || "Noch keine Einträge.")}</p>`;
    return `<div class="timeline-column"><h3>${esc(group.title)}</h3>${body}</div>`;
  }).join("");
}

function renderChips(id, chips, lang){
  document.getElementById(id).innerHTML = chips.map(c =>
    `<span class="chip${c.hot ? " hot" : ""}">${esc(t(c.text,lang))}</span>`).join("");
}

function renderProjects(lang){
  const dict = C.ui[lang] || C.ui.de;
  /* Highlights zuerst, ansonsten Originalreihenfolge beibehalten */
  const ordered = [...C.projects].map((p,i) => ({p,i}))
    .sort((a,b) => Number(!!b.p.highlight) - Number(!!a.p.highlight) || a.i - b.i)
    .map(x => x.p);
  document.getElementById("proj-grid").innerHTML = ordered.map(p => {
    const img = p.image && p.image.url;
    const caption = img ? t(p.image.caption, lang) : "";
    const media = img
      ? `<div class="proj-media has-img"><img src="${esc(p.image.url)}" alt="${esc(t(p.image.alt,lang))}" style="${imgStyle(p.image)}" loading="lazy"></div>`
      : `<div class="proj-media" aria-hidden="true">${esc(dict.ph_img)}</div>`;
    /* Optionaler Projekt-Link: eigene Beschriftung oder Standardtext */
    const linkUrl = p.link && p.link.url;
    const linkLabel = linkUrl ? (t(p.link.label, lang) || dict.proj_link || "Projekt ansehen") : "";
    const link = linkUrl
      ? `<a class="proj-link" href="${esc(linkUrl)}" target="_blank" rel="noopener">${esc(linkLabel)} <span aria-hidden="true">→</span></a>`
      : "";
    return `
    <div class="proj-card ${p.tag === "dance" ? "dance" : "sci"}">
      ${media}
      ${caption ? `<div class="proj-caption">${esc(caption)}</div>` : ""}
      <span class="proj-tag">${esc(p.tag === "dance" ? dict.tag_dance : dict.tag_sci)}${p.highlight ? `<span class="proj-badge">${esc(dict.proj_highlight || "Highlight")}</span>` : ""}</span>
      <h4>${esc(t(p.title,lang))}</h4>
      <p>${esc(t(p.text,lang))}</p>
      ${link}
    </div>`;
  }).join("");
}

function renderMeta(){
  document.getElementById("nav-name").textContent = C.meta.name || "";
  document.getElementById("footer-name").textContent = C.meta.name || "";
  const lines = [];
  if (C.meta.name || C.meta.location) lines.push(`<div>${esc(C.meta.name || "")}${C.meta.name && C.meta.location ? " · " : ""}${esc(C.meta.location || "")}</div>`);
  if (C.meta.email) lines.push(`<div><a href="mailto:${esc(C.meta.email)}">${esc(C.meta.email)}</a></div>`);
  if (C.meta.phone) lines.push(`<div><a href="tel:${esc(C.meta.phone.replace(/[^+\d]/g,""))}">${esc(C.meta.phone)}</a></div>`);
  document.getElementById("contact-lines").innerHTML = lines.join("");
}

function setLang(lang){
  const dict = C.ui[lang] || C.ui.de;
  document.documentElement.lang = lang;
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.getAttribute("data-i18n");
    if (dict[key] !== undefined) el.textContent = dict[key];
  });
  document.querySelectorAll("[data-i18n-html]").forEach(el => {
    const key = el.getAttribute("data-i18n-html");
    if (dict[key] !== undefined) el.innerHTML = dict[key];
  });
  document.querySelectorAll(".lang-switch button").forEach(b =>
    b.classList.toggle("active", b.dataset.lang === lang));
  /* Übersetzte Begriffe in der Bridge-Chipleiste */
  const BRIDGE_CHIPS = {
    de: {mov:"Bewegungsanalyse", dance:"Tanz", rehab:"Rehabilitation", perf:"Menschliche Performance"},
    en: {mov:"Movement analysis", dance:"Dance", rehab:"Rehabilitation", perf:"Human performance"},
    es: {mov:"Análisis del movimiento", dance:"Baile", rehab:"Rehabilitación", perf:"Rendimiento humano"}
  };
  document.querySelectorAll("[data-i18n-chip]").forEach(el => {
    const key = el.getAttribute("data-i18n-chip");
    el.textContent = (BRIDGE_CHIPS[lang] || BRIDGE_CHIPS.de)[key] || "";
  });
  renderTimeline("academic-timeline", C.academic, lang, "acad");
  renderTimeline("dance-timeline", C.dance, lang, "dance");
  renderChips("chips-sci", C.skills.sci.chips, lang);
  renderChips("chips-dance", C.skills.dance.chips, lang);
  renderChips("chips-lang", C.skills.lang.chips, lang);
  renderChips("chips-soft", C.skills.soft.chips, lang);
  renderProjects(lang);
  renderProfile(lang);
  renderDanceGallery(lang);
  const privacyLink = document.getElementById("privacy-link");
  if (privacyLink) privacyLink.href = "datenschutz.html?lang=" + lang;
  /* Aktuell-Zeile: nur anzeigen, wenn Text hinterlegt ist */
  const newsEl = document.getElementById("news-line");
  if (newsEl){
    const newsText = t((C.news || {}).text, lang);
    document.getElementById("news-text").textContent = newsText;
    newsEl.hidden = !newsText;
  }
  /* Buchungs-Button: nur anzeigen, wenn ein Link hinterlegt ist */
  const booking = C.booking || {};
  const bookBtn = document.getElementById("booking-btn");
  if (bookBtn){
    if (booking.url){
      bookBtn.href = booking.url;
      document.getElementById("booking-label").textContent = t(booking.label, lang) || "Termin buchen";
      bookBtn.hidden = false;
    } else {
      bookBtn.hidden = true;
    }
  }
  /* Sprache in der URL abbilden (?lang=…), damit Sprachversionen verlinkbar sind */
  try {
    const params = new URLSearchParams(location.search);
    params.set("lang", lang);
    history.replaceState(null, "", location.pathname + "?" + params.toString() + location.hash);
  } catch(e){}
  try { localStorage.setItem("javi_lang", lang); } catch(e){}
}

document.querySelectorAll(".lang-switch button").forEach(b =>
  b.addEventListener("click", () => setLang(b.dataset.lang)));

const menuToggle = document.getElementById("menu-toggle");
const navLinks = document.getElementById("nav-links");
function closeMobileMenu(){
  navLinks?.classList.remove("open");
  menuToggle?.setAttribute("aria-expanded", "false");
  menuToggle?.setAttribute("aria-label", "Navigation öffnen");
}
menuToggle?.addEventListener("click", () => {
  const isOpen = navLinks.classList.toggle("open");
  menuToggle.setAttribute("aria-expanded", String(isOpen));
  menuToggle.setAttribute("aria-label", isOpen ? "Navigation schliessen" : "Navigation öffnen");
});
navLinks?.querySelectorAll("a").forEach(a => a.addEventListener("click", closeMobileMenu));
window.addEventListener("resize", () => { if (window.innerWidth > 840) closeMobileMenu(); });

renderMeta();
renderSocials("contact-socials");
document.getElementById("year").textContent = new Date().getFullYear();

/* Scroll-Hinweis ausblenden, sobald gescrollt wird */
const hint = document.querySelector(".scroll-hint");
window.addEventListener("scroll", () => {
  hint.classList.toggle("hidden", window.scrollY > 60);
}, {passive:true});

/* Strukturierte Daten (JSON-LD, Person-Schema) aus content.js erzeugen */
(function injectJsonLd(){
  const sameAs = ["linkedin","instagram","tiktok","youtube"]
    .map(k => C.socials[k]).filter(Boolean);
  const ld = {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": C.meta.name,
    "jobTitle": "Data Engineer & Salsa Instructor",
    "description": "Data Engineer, Applied Digital Life Science student (ZHAW) and salsa instructor in Bern, Switzerland.",
    "email": C.meta.email ? "mailto:" + C.meta.email : undefined,
    "telephone": C.meta.phone || undefined,
    "address": {"@type": "PostalAddress", "addressLocality": "Bern", "addressCountry": "CH"},
    "affiliation": [
      {"@type": "CollegeOrUniversity", "name": "ZHAW Zürcher Hochschule für Angewandte Wissenschaften"},
      {"@type": "Organization", "name": "Salsadancers Bern"}
    ],
    "knowsLanguage": ["de", "en", "es"],
    "sameAs": sameAs,
    "url": location.origin + location.pathname
  };
  Object.keys(ld).forEach(k => ld[k] === undefined && delete ld[k]);
  const s = document.createElement("script");
  s.type = "application/ld+json";
  s.textContent = JSON.stringify(ld);
  document.head.appendChild(s);
})();

/* hreflang-Alternativen für DE/EN/ES (Sprachversionen via ?lang=…) */
(function injectHreflang(){
  const base = location.origin + location.pathname;
  const add = (hreflang, href) => {
    const l = document.createElement("link");
    l.rel = "alternate"; l.hreflang = hreflang; l.href = href;
    document.head.appendChild(l);
  };
  for (const lang of ["de","en","es"]) add(lang, base + "?lang=" + lang);
  add("x-default", base);
})();

/* Startsprache: URL-Parameter > gespeicherte Wahl > Deutsch */
let startLang = "de";
try {
  const urlLang = new URLSearchParams(location.search).get("lang");
  if (["de","en","es"].includes(urlLang)) startLang = urlLang;
  else startLang = localStorage.getItem("javi_lang") || "de";
} catch(e){}
setLang(startLang);
</script>
